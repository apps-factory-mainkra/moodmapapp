name: moodmapapp
description: Track your daily mood and discover personalized activities to boost your well-being.
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # Networking
  http: ^1.1.0

  # Local storage
  shared_preferences: ^2.2.0

  # UI/UX
  google_fonts: ^6.0.0
  intl: ^0.19.0

  # Utilities
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
